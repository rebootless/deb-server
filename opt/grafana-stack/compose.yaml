services:
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      # Username loaded from .env (created by deploy-grafana.sh)
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      # Password loaded from Docker secret
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_SERVER_ROOT_URL: "http://deb-server.local/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    secrets:
      - grafana_admin_password
    volumes:
      - ./grafana/data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      # Bind only to loopback — Nginx proxies /grafana/ externally
      - "127.0.0.1:3000:3000"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://localhost:3000/api/health | grep -q '"database":"ok"'
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/data:/prometheus
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://localhost:9090/-/ready | grep -q Ready
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - monitoring

  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    networks:
      - monitoring

secrets:
  grafana_admin_password:
    file: ./secrets/grafana_admin_password.txt

networks:
  monitoring:
    driver: bridge
